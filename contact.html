<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelBloom - Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">TravelBloom</div>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </div>
    <div class="nav-right">
      <input type="text" id="search-input" placeholder="Search destinations">
      <button id="search-btn">Search</button>
      <button id="clear-btn">Clear</button>
    </div>
  </nav>

  <section class="contact">
    <h1>Contact Us</h1>
    <p>Email: support@travelbloom.com</p>
    <p>Phone: +1 (555) 123-4567</p>

    <form action="mailto:support@travelbloom.com" method="post" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
